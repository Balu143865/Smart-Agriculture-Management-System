<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Silence benign Vite WebSocket / HMR failure errors in development
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason) {
          const reasonStr = typeof event.reason === 'string' ? event.reason : (event.reason.message || '');
          if (reasonStr.includes('WebSocket') || reasonStr.includes('websocket') || reasonStr.includes('HMR') || reasonStr.includes('vite')) {
            event.preventDefault();
            console.warn('Suppressed benign HMR WebSocket rejection:', event.reason);
          }
        }
      });

      window.addEventListener('error', function(event) {
        const msg = event.message || '';
        if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('vite') || msg.includes('HMR')) {
          event.preventDefault();
          console.warn('Suppressed benign HMR error:', event.message);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
